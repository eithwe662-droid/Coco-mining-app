<!DOCTYPE html>
<html>
<head>
<title>Team</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#ff7b00;color:white;text-align:center;}
.card{background:white;color:black;margin:15px;padding:15px;border-radius:15px;}
</style>
</head>

<body>

<h2>👥 My Team</h2>

<div class="card">
<p>Your Invite Code:</p>
<h3 id="code">ABC123</h3>
<button onclick="copyCode()">Copy Code</button>
</div>

<div class="card">
<h3>Members</h3>
<p>Member list will show here</p>
</div>

<script>
function copyCode(){
  navigator.clipboard.writeText("ABC123");
  alert("Copied!");
}
</script>

</body>
</html>
