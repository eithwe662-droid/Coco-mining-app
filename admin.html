<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h2>👑 Admin Panel</h2>
<p id="msg"></p>

<button onclick="logout()">Logout</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMUs2OC2ZH5tKb86FSuW9NwdDSIvZEzaA",
  authDomain: "coco-website-aafe4.firebaseapp.com",
  projectId: "coco-website-aafe4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 ADMIN UID
const ADMIN_UID = "W98lHziAPKUM5Si6hB5l0DXfR5H2";

// 🔒 PROTECT
onAuthStateChanged(auth, (user)=>{
  if(!user || user.uid !== ADMIN_UID){
    document.getElementById("msg").innerText = "Access Denied ❌";
    setTimeout(()=>{
      window.location.href = "index.html";
    },2000);
  }else{
    document.getElementById("msg").innerText = "Welcome Admin 👑";
  }
});

// Logout
window.logout = function(){
  signOut(auth);
  window.location.href = "index.html";
}

</script>

</body>
</html>
