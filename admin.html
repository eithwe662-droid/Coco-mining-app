<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h2>👑 Admin Panel</h2>
<p id="msg"></p>

<button onclick="loadUsers()">📊 Load Users</button>
<br><br>

<div id="users"></div>

<button onclick="logout()">Logout</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { getFirestore, collection, getDocs, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMUs2OC2ZH5tKb86FSuW9NwdDSIvZEzaA",
  authDomain: "coco-website-aafe4.firebaseapp.com",
  projectId: "coco-website-aafe4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 ADMIN UID
const ADMIN_UID = "W98lHziAPKUM5Si6hB5l0DXfR5H2";

// 🔒 Protect
onAuthStateChanged(auth, (user)=>{
  if(!user || user.uid !== ADMIN_UID){
    document.getElementById("msg").innerText = "Access Denied ❌";
    setTimeout(()=>{
      window.location.href = "index.html";
    },2000);
  }else{
    document.getElementById("msg").innerText = "Welcome Admin 👑";
  }
});

// 📊 Load Users
window.loadUsers = async function(){
  const querySnapshot = await getDocs(collection(db, "users"));
  let html = "";

  querySnapshot.forEach((docSnap)=>{
    let user = docSnap.data();

    html += `
      <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <p>📱 ${user.phone}</p>
        <p>💰 Balance: ${user.balance}</p>
        <p>💎 VIP: ${user.vip}</p>

        <button onclick="makeVIP('${docSnap.id}')">Upgrade VIP</button>
        <button onclick="addMoney('${docSnap.id}')">Add 1000</button>
      </div>
    `;
  });

  document.getElementById("users").innerHTML = html;
}

// 💎 VIP Upgrade
window.makeVIP = async function(uid){
  await updateDoc(doc(db,"users",uid),{
    vip: true
  });
  alert("VIP Updated ✅");
}

// 💰 Add Money
window.addMoney = async function(uid){
  let ref = doc(db,"users",uid);
  await updateDoc(ref,{
    balance: 1000
  });
  alert("Balance Added 💰");
}

// Logout
window.logout = function(){
  signOut(auth);
  window.location.href = "index.html";
}

</script>

</body>
</html>
