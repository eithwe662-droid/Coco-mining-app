<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body{
      background:#0f172a;
      color:white;
      font-family:Arial;
      text-align:center;
    }
    table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
    }
    th, td{
      border:1px solid #334155;
      padding:10px;
    }
    button{
      padding:5px 10px;
      background:#22c55e;
      border:none;
      border-radius:5px;
    }
  </style>
</head>

<body>

<h2>📊 Admin Panel</h2>

<h3>👥 Users</h3>
<table>
  <thead>
    <tr>
      <th>User ID</th>
      <th>Balance</th>
      <th>VIP</th>
    </tr>
  </thead>
  <tbody id="users"></tbody>
</table>

<h3>💸 Withdraw Requests</h3>
<table>
  <thead>
    <tr>
      <th>User</th>
      <th>Amount</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="withdraws"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { getFirestore, collection, getDocs, updateDoc, doc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "coco-website-aafe4.firebaseapp.com",
  projectId: "coco-website-aafe4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 Admin UID (မင်း UID ထည့်)
const ADMIN_UID = "YOUR_UID_HERE";

// 🔒 Check admin
onAuthStateChanged(auth, async (user)=>{
  if(!user || user.uid !== ADMIN_UID){
    alert("Not admin");
    window.location.href="index.html";
    return;
  }

  loadUsers();
  loadWithdraws();
});

// 👥 Load Users
async function loadUsers(){
  const snap = await getDocs(collection(db,"users"));
  let html = "";

  snap.forEach(docu=>{
    let d = docu.data();
    html += `
      <tr>
        <td>${docu.id}</td>
        <td>${d.balance || 0}</td>
        <td>${d.vip || 0}</td>
      </tr>
    `;
  });

  document.getElementById("users").innerHTML = html;
}

// 💸 Load Withdraws
async function loadWithdraws(){
  const snap = await getDocs(collection(db,"withdraws"));
  let html = "";

  snap.forEach(docu=>{
    let d = docu.data();

    html += `
      <tr>
        <td>${d.user}</td>
        <td>${d.amount}</td>
        <td>
          <button onclick="approve('${docu.id}')">Approve</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("withdraws").innerHTML = html;
}

// ✅ Approve Withdraw
window.approve = async function(id){
  await updateDoc(doc(db,"withdraws",id),{
    status:"approved"
  });

  alert("Approved");
  location.reload();
}

</script>

</body>
</html>
