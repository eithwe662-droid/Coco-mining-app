<!DOCTYPE html>
<html>
<head>
  <title>Coco Mining</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff7b00, #ffb347);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
      color: #ff7b00;
    }

    p {
      color: gray;
      font-size: 14px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    input:focus {
      border-color: #ff7b00;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #ff7b00;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #ff5500;
    }

    #status {
      margin-top: 10px;
      font-size: 13px;
      color: red;
    }

  </style>
</head>

<body>

<div class="box">

  <h1>⛏️ Coco Mining</h1>
  <p>Login or Signup to start earning</p>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>

  <p id="status"></p>

</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMUs2OC2ZH5tKb86FSuW9NwdDSIvZEzaA",
  authDomain: "coco-website-aafe4.firebaseapp.com",
  projectId: "coco-website-aafe4",
  storageBucket: "coco-website-aafe4.firebasestorage.app",
  messagingSenderId: "970278650841",
  appId: "1:970278650841:web:248a3a4be7365d03f80fc8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Signup
window.signup = async function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  try{
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCredential.user.uid), {
      balance: 0,
      vip: 0,
      lastClaim: 0
    });

    document.getElementById("status").innerText = "Signup Success ✅";

  }catch(err){
    document.getElementById("status").innerText = err.message;
  }
}

// Login
window.login = async function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  try{
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "home.html";
  }catch(err){
    document.getElementById("status").innerText = err.message;
  }
}

</script>

</body>
  </html>
