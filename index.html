<!DOCTYPE html>
<html>
<head>
  <title>Coco Mining</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff7b00, #ffb347);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: 0.3s;
    }

    /* DARK MODE */
    body.dark {
      background: #121212;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 350px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);

      /* FADE ANIMATION */
      opacity: 0;
      transform: translateY(30px);
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    body.dark .box {
      background: #1e1e1e;
      color: white;
    }

    h1 {
      color: #ff7b00;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
      outline: none;
    }

    body.dark input {
      background: #333;
      color: white;
      border: 1px solid #555;
    }

    button {
      width: 95%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #ff7b00;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: #ff5500;
    }

    .toggle {
      margin-top: 10px;
      cursor: pointer;
      font-size: 13px;
      color: gray;
    }

    #status {
      margin-top: 10px;
      font-size: 13px;
      color: red;
    }

    .top-bar {
      position: absolute;
      top: 10px;
      right: 10px;
    }

    .top-bar button {
      width: auto;
      padding: 6px 10px;
      font-size: 12px;
    }

  </style>
</head>

<body>

<!-- Dark Mode Button -->
<div class="top-bar">
  <button onclick="toggleDark()">🌙</button>
</div>

<div class="box">

  <h1>⛏️ Coco Mining</h1>
  <p>Login or Signup to start earning</p>

  <input id="email" placeholder="Email">

  <!-- Password + Show/Hide -->
  <div style="position: relative;">
    <input id="password" type="password" placeholder="Password">
    <span onclick="togglePass()" 
      style="position:absolute; right:15px; top:12px; cursor:pointer;">👁️</span>
  </div>

  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>

  <p id="status"></p>

</div>

<script>
function togglePass(){
  let pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

function toggleDark(){
  document.body.classList.toggle("dark");
}
</script>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMUs2OC2ZH5tKb86FSuW9NwdDSIvZEzaA",
  authDomain: "coco-website-aafe4.firebaseapp.com",
  projectId: "coco-website-aafe4",
  storageBucket: "coco-website-aafe4.firebasestorage.app",
  messagingSenderId: "970278650841",
  appId: "1:970278650841:web:248a3a4be7365d03f80fc8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Signup
window.signup = async function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  try{
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCredential.user.uid), {
      balance: 0,
      vip: 0,
      lastClaim: 0
    });

    document.getElementById("status").style.color = "green";
    document.getElementById("status").innerText = "Signup Success ✅";

  }catch(err){
    document.getElementById("status").style.color = "red";
    document.getElementById("status").innerText = err.message;
  }
}

// Login
window.login = async function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  try{
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "home.html";
  }catch(err){
    document.getElementById("status").style.color = "red";
    document.getElementById("status").innerText = err.message;
  }
}

</script>

</body>
</html>
