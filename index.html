<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>👤 Login / Signup</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMUs2OC2ZH5tKb86FSuW9NwdDSIvZEzaA",
  authDomain: "coco-website-aafe4.firebaseapp.com",
  projectId: "coco-website-aafe4",
  storageBucket: "coco-website-aafe4.firebasestorage.app",
  messagingSenderId: "970278650841",
  appId: "1:970278650841:web:248a3a4be7365d03f80fc8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// SIGNUP
window.signup = async function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  try{
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCredential.user.uid), {
      balance: 0,
      vip: 0,
      lastClaim: 0
    });

    document.getElementById("status").innerText = "Signup Success ✅";

  }catch(err){
    document.getElementById("status").innerText = err.message;
  }
}

// LOGIN
window.login = async function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  try{
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "home.html";
  }catch(err){
    document.getElementById("status").innerText = err.message;
  }
}

</script>

</body>
  </html>
