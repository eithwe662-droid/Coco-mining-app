<!DOCTYPE html>
<html>
<head>
  <title>Coco Mining</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #2c5364);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 350px;
      text-align: center;
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      animation: fade 1s ease;
    }

    @keyframes fade {
      from {opacity:0; transform:translateY(30px);}
      to {opacity:1; transform:translateY(0);}
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      width: 95%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #00ffcc;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: #00ccaa;
    }

    #status {
      margin-top: 10px;
      color: #ff8080;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>⛏️ Coco Mining</h1>
  <p>Login to start earning</p>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>

  <p id="status"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMUs2OC2ZH5tKb86FSuW9NwdDSIvZEzaA",
  authDomain: "coco-website-aafe4.firebaseapp.com",
  projectId: "coco-website-aafe4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 ADMIN UID
const ADMIN_UID = "W98lHziAPKUM5Si6hB5l0DXfR5H2";

// Signup
window.signup = async function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  try{
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCredential.user.uid), {
      balance: 0,
      vip: 0,
      lastClaim: 0
    });

    document.getElementById("status").innerText = "Signup Success ✅";

  }catch(err){
    document.getElementById("status").innerText = err.message;
  }
}

// Login
window.login = async function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  try{
    const userCredential = await signInWithEmailAndPassword(auth, email, password);

    if(userCredential.user.uid === ADMIN_UID){
      window.location.href = "admin.html";
    }else{
      window.location.href = "home.html";
    }

  }catch(err){
    document.getElementById("status").innerText = err.message;
  }
}

</script>

</body>
</html>
