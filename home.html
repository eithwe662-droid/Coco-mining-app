<!DOCTYPE html>
<html>
<head>
  <title>Coco Mining</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff7b00, #ffb347);
      color: white;
      text-align: center;
      transition: 0.3s;
    }

    body.dark {
      background: #121212;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
    }

    .top-bar button {
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .card {
      background: white;
      color: black;
      margin: 20px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    body.dark .card {
      background: #1e1e1e;
      color: white;
    }

    .balance {
      font-size: 28px;
      font-weight: bold;
      margin: 10px 0;
    }

    .btn {
      padding: 12px;
      width: 80%;
      border: none;
      border-radius: 10px;
      background: #ff7b00;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #ff5500;
    }

    .progress {
      width: 80%;
      height: 10px;
      background: #ddd;
      margin: 15px auto;
      border-radius: 10px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #ff7b00;
      transition: 1s;
    }

    .coin {
      font-size: 30px;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0% {transform: translateY(0);}
      50% {transform: translateY(-10px);}
      100% {transform: translateY(0);}
    }

  </style>
</head>

<body>

<div class="top-bar">
  <button onclick="toggleDark()">🌙</button>
  <button onclick="logout()">Logout</button>
</div>

<h2>⛏️ Coco Mining</h2>
<p id="user"></p>

<div class="card">
  <div class="coin">💎</div>
  <div class="balance" id="balance">0</div>
  <p>Balance</p>
</div>

<div class="card">
  <p id="timer">Ready to mine</p>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <button class="btn" onclick="mine()">Start Mining</button>
</div>

<script>
function toggleDark(){
  document.body.classList.toggle("dark");
}
</script>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { getFirestore, doc, getDoc, updateDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMUs2OC2ZH5tKb86FSuW9NwdDSIvZEzaA",
  authDomain: "coco-website-aafe4.firebaseapp.com",
  projectId: "coco-website-aafe4",
  storageBucket: "coco-website-aafe4.firebasestorage.app",
  messagingSenderId: "970278650841",
  appId: "1:970278650841:web:248a3a4be7365d03f80fc8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let balance = 0;
let lastClaim = 0;

onAuthStateChanged(auth, async (user)=>{
  if(user){
    currentUser = user;
    document.getElementById("user").innerText = user.email;

    const snap = await getDoc(doc(db, "users", user.uid));
    if(snap.exists()){
      balance = snap.data().balance;
      lastClaim = snap.data().lastClaim || 0;
      document.getElementById("balance").innerText = balance;
    }

  }else{
    window.location.href = "index.html";
  }
});

// Logout
window.logout = function(){
  signOut(auth);
}

// Mining
window.mine = async function(){

  let now = Date.now();
  let cooldown = 10000;

  if(now - lastClaim < cooldown){
    let remain = Math.floor((cooldown - (now - lastClaim))/1000);
    document.getElementById("timer").innerText = "Wait " + remain + "s";
    return;
  }

  let reward = 50;
  balance += reward;
  lastClaim = now;

  document.getElementById("balance").innerText = balance;
  document.getElementById("timer").innerText = "+50 Coin ✅";

  // progress animation
  let bar = document.getElementById("bar");
  bar.style.width = "100%";
  setTimeout(()=>{ bar.style.width = "0%"; },1000);

  await updateDoc(doc(db, "users", currentUser.uid), {
    balance: balance,
    lastClaim: lastClaim
  });
}

</script>

</body>
</html>
